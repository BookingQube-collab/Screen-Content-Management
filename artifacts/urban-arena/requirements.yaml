packages:
  "framer-motion": "For cinematic page transitions, smooth carousel sliding, and premium UI animations on the public display"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging Tailwind CSS classes without style conflicts"
  "date-fns": "For formatting dates in the admin dashboard"
  "react-hook-form": "For robust form state management in the admin panel"
  "@hookform/resolvers": "For integrating Zod validation with react-hook-form"

images:
  - path: "artifacts/urban-arena/public/images/logo-urban-arena.png"
    description: "A premium, cinematic logo for 'URBAN ARENA'. Minimalist geometric typography, deep red and white on a completely transparent background. Entertainment and futuristic vibe."
    aspect_ratio: "16:9"
  - path: "artifacts/urban-arena/public/images/bg-abstract-red.png"
    description: "A dark, cinematic abstract background. Deep blacks and charcoal with subtle, glowing dark red gradients and light leaks. Premium, immersive, and moody."
    aspect_ratio: "9:16"
  - path: "artifacts/urban-arena/public/images/placeholder-vr.png"
    description: "A highly stylized, cinematic photo of someone wearing a VR headset in a dark room illuminated by neon red lights. High quality, premium."
    aspect_ratio: "9:16"
  - path: "artifacts/urban-arena/public/images/placeholder-racing.png"
    description: "A cinematic, action-packed shot of a professional racing simulator setup glowing in a dark room with red accents."
    aspect_ratio: "9:16"

notes:
  - "Assuming customFetch does not automatically attach localStorage tokens, so we pass Authorization headers explicitly via the `request` options in generated hooks."
  - "The /display route is designed for a 1080x1920 (portrait) kiosk screen."
