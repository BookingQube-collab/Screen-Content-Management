kind = "web"
previewPath = "/"
title = "Urban Arena"
version = "1.0.0"
id = "artifacts/urban-arena"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24725

[services.development]
run = "pnpm --filter @workspace/urban-arena run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/urban-arena", "run", "build" ]
publicDir = "artifacts/urban-arena/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24725"
BASE_PATH = "/"
